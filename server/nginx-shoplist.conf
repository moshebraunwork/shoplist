# /etc/nginx/sites-available/shop.mobrauntech.com
# Reverse proxy for the ShopList backend, mirroring your Drop setup.
# After saving: ln -s into sites-enabled, then `sudo certbot --nginx -d shop.mobrauntech.com`

server {
    listen 80;
    server_name shop.mobrauntech.com;

    # Allow uploaded images up to the multer limit
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
